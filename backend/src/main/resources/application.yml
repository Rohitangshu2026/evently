spring:
  application:
    name: evently
  datasource:
    # 55432 → Dockerized Postgres (host 5432/5433 already taken).
    url: jdbc:postgresql://localhost:55432/evently
    username: evently
    password: evently
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: false

app:
  jwt:
    issuer: evently
    # Access token lifetime (short) and refresh token lifetime (long).
    access-ttl: PT15M
    refresh-ttl: P14D
    # DEV-ONLY signing keys committed under resources/keys — replace in prod.
    private-key-location: classpath:keys/jwt_ed25519_private.pem
    public-key-location: classpath:keys/jwt_ed25519_public.pem
  cookie:
    # Refresh-token cookie flags. secure=false for local http dev; true in prod.
    refresh-name: evently_refresh
    secure: false
    same-site: Strict
  rate-limit:
    # Bucket4j: attempts per minute per IP on /auth/login and /auth/signup.
    auth-attempts-per-minute: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
